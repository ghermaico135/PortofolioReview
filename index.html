<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="portofolio-container">
            <div class="portofolio-header">
                <img src="./images/icons8-home-screen-50.png"  class="logo" alt="humberger">
                <img src="./images/icons8-menu-50.png"  class="humbergerMenu" alt="humberger">
            </div>
            <div class="homepage">
                    <div class="portofolio-title">
                        <h1 class="title">
                            Hey there. I’m Alex.I’m a software developer
                        </h1>
                    </div>
                    <div class="portofolio-description">
                        <p class="description"> I can help you build a product , feature or website Look through some of my work
                             and experience! If you like what you see and have a project you need coded, 
                             don’t hesitate to contact me.</p>
                    </div>
                    <div class="social-media">
                        <img class="icons" src="./images/icons8-x-50.png" alt="x">
                        <img class="icons" src="./images/icons8-linkedin-30.png" alt="linkedin">
                        <img class="icons" src="./images/icons8-gmail-48.png" alt="Mail">
                        <img class="icons" src="./images/icons8-github-50.png" alt="github">
                    </div>
                    <div class="action">
                        <img class="cheveron-action" src="./images/icons8-chevron-50.png" alt="action">
                    </div>
            </div>
        </div>
    </header>
</body>
</html>
